version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multimodal-rag-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - USE_MOCK=${USE_MOCK:-true}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - REDIS_URL=redis://redis:6379
      - ENABLE_CACHE=${ENABLE_CACHE:-false}
      - RETRIEVER_MODE=${RETRIEVER_MODE:-auto}
      - PIPELINE_MODE=${PIPELINE_MODE:-default}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - ENABLE_CLOUDWATCH=${ENABLE_CLOUDWATCH:-false}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: multimodal-rag-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - ./frontend:/app/frontend

  # Optional: Vector Database (if using Qdrant instead of FAISS)
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: qdrant
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant_data:/qdrant/storage

volumes:
  redis_data:
