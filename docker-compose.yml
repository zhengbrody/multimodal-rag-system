version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multimodal-rag-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - USE_MOCK=${USE_MOCK:-true}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: multimodal-rag-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - ./frontend:/app/frontend

  # Optional: Vector Database (if using Qdrant instead of FAISS)
