apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-frontend
  namespace: rag-system
  labels:
    app: rag-frontend
    app.kubernetes.io/part-of: rag-system
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-frontend
  template:
    metadata:
      labels:
        app: rag-frontend
        app.kubernetes.io/part-of: rag-system
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: rag-frontend
          image: rag-system-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              protocol: TCP
          env:
            - name: API_URL
              value: "http://rag-api-service:80"
          resources:
            requests:
              cpu: 125m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
