apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api-hpa
  namespace: rag-system
  labels:
    app: rag-api
    app.kubernetes.io/part-of: rag-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-api
  minReplicas: 2
  maxReplicas: 6
  # CPU-driven autoscaling. Target 50% of the pod's CPU *request* (100m) — so a pod
  # sustaining >50m of CPU under load pushes utilization over target and triggers scale-up.
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    # Tuned for a short, observable demo: react fast on the way up. Production would use a
    # larger stabilization window to dampen flapping — the trade-off is responsiveness vs. churn.
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
    # Scale down conservatively (60s window) so the demo can observe it without a long wait,
    # while still avoiding thrash on brief dips.
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
