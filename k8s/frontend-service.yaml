apiVersion: v1
kind: Service
metadata:
  name: rag-frontend-service
  namespace: rag-system
  labels:
    app: rag-frontend
    app.kubernetes.io/part-of: rag-system
    app.kubernetes.io/component: frontend
spec:
  type: LoadBalancer
  selector:
    app: rag-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
