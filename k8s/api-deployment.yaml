apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag-system
  labels:
    app: rag-api
    app.kubernetes.io/part-of: rag-system
    app.kubernetes.io/component: api
spec:
  replicas: 2  # start at the HPA floor so the demo shows a clean 2 -> N scale-up
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
        app.kubernetes.io/part-of: rag-system
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: rag-api
          image: rag-system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rag-system-config
            - secretRef:
                name: rag-system-secrets
                optional: true  # mock mode needs no keys; prod supplies the real secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      # No data-volume mount: the image bakes data/raw/knowledge_base.json, and an
      # emptyDir at /app/data would shadow it and break mock-mode startup.
