apiVersion: v1
kind: Secret
metadata:
  name: rag-system-secrets
  namespace: rag-system
  labels:
    app.kubernetes.io/part-of: rag-system
type: Opaque
data:
  # Base64-encoded values — replace with actual secrets before applying
  # echo -n "your-api-key" | base64
  OPENAI_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  PINECONE_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  REDIS_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
